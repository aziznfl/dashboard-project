services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - HTTP_ADDR=:8080
      - DB_SOURCE=dashboard.db
      - OPENAPIYAML_LOCATION=./openapi.yaml
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - backend_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  backend_data:
